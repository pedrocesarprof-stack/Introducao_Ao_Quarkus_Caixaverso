openapi: 3.0.3
info:
  title: Cliente API (Aula 06)
  description: API de gerenciamento de clientes com preenchimento automático de
    endereço via integração com ViaCEP.
  version: 1.1.0
  contact:
    name: Suporte ADA
    email: suporte@ada.com.br
servers:
  - url: http://localhost:8080
    description: Local Server
tags:
  - name: Clientes
    description: Operações relacionadas ao cadastro e consulta de clientes
paths:
  /clientes:
    get:
      summary: Lista todos os clientes
      description: Retorna uma lista de todos os clientes cadastrados no sistema.
      operationId: listClients
      tags:
        - Clientes
      responses:
        "200":
          description: Listagem de clientes recuperada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClienteResponse"
    post:
      summary: Cadastra um novo cliente
      description: Recebe os dados básicos e o CEP. O sistema consulta a API do ViaCEP
        e retorna o cliente com logradouro e bairro preenchidos.
      operationId: createClient
      tags:
        - Clientes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteRequest"
      responses:
        "201":
          description: Cliente criado com sucesso e endereço completo preenchido
            automaticamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "400":
          description: Dados de entrada inválidos ou CEP não encontrado.
  /clientes/{documento}:
    get:
      summary: Busca um cliente pelo documento
      description: Retorna os detalhes de um único cliente buscando pelo seu CPF/CNPJ.
      operationId: getClientByDocument
      tags:
        - Clientes
      parameters:
        - name: documento
          in: path
          description: Documento de identificação do cliente (CPF ou CNPJ)
          required: true
          schema:
            type: string
            pattern: "^[0-9]{11}$|^[0-9A-Z]{12}[0-9]{2}$"
            example: "12345678900"
      responses:
        "200":
          description: Cliente encontrado e retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "404":
          description: Cliente não encontrado para o documento informado.
  /clientes/{clienteId}/taxas/{tipoAmortizacao}/elegibilidade:
    get:
      summary: Executa análise de risco e consulta índice da taxa
      description: Endpoint HTTP GET que avalia a saúde financeira do cliente com base
        no seu UUID e retorna a taxa de juros ou rejeita a transação caso a
        elegibilidade falhe.
      tags:
        - Clientes
      operationId: checkEligibility
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único UUID de conta do solicitante.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
        - name: tipoAmortizacao
          in: path
          required: true
          description: Sistema de amortização selecionado pelo solicitante.
          schema:
            type: string
            enum: [ SAC, PRICE ]
            example: "SAC"
      responses:
        "200":
          description: Solicitação aprovada. Retorna a taxa de juros calculada aplicável.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateResponse"
        "400":
          description: Cliente inelegível, reprovado pela política interna do banco ou
            risco alto.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ClienteRequest:
      type: object
      description: Objeto de requisição para cadastro de cliente. Não deve incluir id,
        logradouro e bairro.
      properties:
        nome:
          type: string
          description: Nome completo do cliente.
          example: "João Silva"
          minLength: 4
          maxLength: 150
        documento:
          type: string
          description: Documento de identificação legal único (CPF/CNPJ).
          example: "12345678900"
          pattern: "^[0-9]{11}$|^[0-9A-Z]{12}[0-9]{2}$"
        cep:
          type: string
          description: CEP válido (8 dígitos numéricos). Será utilizado na busca automática.
          example: "01001000"
          pattern: "^[0-9]{8}$"
        numero:
          type: string
          description: Número da residência ou do estabelecimento físico.
          example: "123"
          minLength: 1
          maxLength: 20
        complemento:
          type: string
          description: Detalhamento extra do endereço (Ponto de referência, bloco,
            apartamento, etc).
          example: "Apto 42"
          maxLength: 50
      required:
        - nome
        - documento
        - cep
        - numero
    ClienteResponse:
      type: object
      description: Objeto de resposta representando um cliente plenamente cadastrado.
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único gerado na consolidação do cadastro.
          example: "123e4567-e89b-12d3-a456-426614174000"
        nome:
          type: string
          description: Nome completo cadastrado.
          example: "João Silva"
        documento:
          type: string
          description: Documento informado no cadastro.
          example: "12345678900"
        cep:
          type: string
          description: CEP fornecido no cadastro.
          example: "01001-000"
        logradouro:
          type: string
          description: Logradouro (rua, avenida) retornado automaticamente pelo ViaCEP.
          example: "Praça da Sé"
        bairro:
          type: string
          description: Bairro retornado automaticamente pelo ViaCEP.
          example: "Sé"
        numero:
          type: string
          description: Número da residência cadastrado.
          example: "123"
        complemento:
          type: string
          description: Complemento retornado. Se não fornecido, preenchido como 'N/A'.
          example: "Apto 42"
          default: "N/A"
    RateResponse:
      type: object
      description: Objeto contendo os dados e a referência da taxa consultada.
      properties:
        clientId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
          description: O identificador único de base UUID que foi avaliado.
        taxaJurosMensal:
          type: number
          format: integer
          example: 2
          description: Taxa de juros do mês indexada em formato fracionário (ex. 0.02
            corresponde a incidência de 2% ao mês).
      required:
        - clientId
        - taxaJurosMensal
    ErrorResponse:
      type: object
      description: Resposta padrão do Quarkus para Constraint Violations.
      properties:
        title:
          type: string
          example: "Constraint Violation"
        status:
          type: integer
          example: 400
        violations:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "criarCliente.criarClienteDTO.documento"
              message:
                type: string
                example: "deve corresponder a \"^[0-9]{11}$|^[0-9A-Z]{12}[0-9]{2}$\""
